# ── Types de saisonnalité ─────────────────────────────────────────────────────
seasonality_types:
  standard:
    description: "Pic en Q4 (Noël), creux en été"
    amplitude:   0.25
    phase_shift: -1.57   # -π/2

  mediterranean:
    description: "Pic en été (tourisme), fort Q4"
    amplitude:   0.30
    phase_shift: -1.05

  nordic:
    description: "Pic très marqué en Q4, creux profond en été"
    amplitude:   0.35
    phase_shift: -1.88

  eastern:
    description: "Double pic : Q1 (Pâques) + Q4 (Noël)"
    amplitude:   0.28
    phase_shift: -1.26

  mild:
    description: "Saisonnalité atténuée — marché mature"
    amplitude:   0.15
    phase_shift: -1.57